name: auxiliomecanico_movil
description: "Aplicación móvil para Auxilio Mecánico con Flutter."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.1
  provider: ^6.1.2
  flutter_secure_storage: ^10.0.0
  jwt_decode: ^0.3.1
  intl: ^0.20.2
  cupertino_icons: ^1.0.8
  flutter_map: ^8.3.0
  latlong2: ^0.9.0
  geolocator: ^14.0.2
  file_picker: ^11.0.2
  record: ^6.2.0
  path_provider: ^2.1.4
  permission_handler: ^12.0.1
  speech_to_text: ^7.3.0
  # Usar versiones que existen
  firebase_core: ^3.15.2    
  firebase_messaging: ^15.2.0 
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
